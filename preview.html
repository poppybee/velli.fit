<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELLI | Empowering Every Woman (velli.fit)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: white; color: black; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7',
                            400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857',
                            800: '#065f46', 900: '#064e3b', 950: '#022c22',
                        },
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-white text-black antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const categories = [
            { id: 'yoga', name: 'Yoga Collection', description: 'Find your inner peace with ultimate comfort.', image: 'https://sc02.alicdn.com/kf/A0740e36231e94944a5611cd53914bb20R.png' },
            { id: 'running', name: 'Running Gear', description: 'Engineered for speed and endurance.', image: 'https://sc02.alicdn.com/kf/A435e129ac0a94a98925f2ce1f23f4e18l.png' },
            { id: 'gym', name: 'Gym & Training', description: 'Push your limits, shape your future.', image: 'https://sc02.alicdn.com/kf/A8d06d4349ead44cab8c9583048b23f9eH.png' },
        ];

        const products = [
            { id: '1', name: 'Seamless Mint Sports Bra', price: 29.99, category: 'Yoga', image: 'https://sc02.alicdn.com/kf/Aae86bbb14560415e96c49cd063646af78.png', rating: 4.8 },
            { id: '2', name: 'High-Waist Compression Leggings', price: 49.99, category: 'Gym', image: 'https://sc02.alicdn.com/kf/A72ac8a5a6fa74b41a6b927cb0c99497fS.png', rating: 4.9 },
            { id: '3', name: 'Performance Racing Windbreaker', price: 79.99, category: 'Running', image: 'https://sc02.alicdn.com/kf/A3b6568329cd54365ae2b3c8ebf99f583s.png', rating: 4.7 },
            { id: '4', name: 'Premium Charcoal Workout Set', price: 89.99, category: 'Gym', image: 'https://sc02.alicdn.com/kf/A1869056bab7c4be3867cfc4c4596c2b3i.png', rating: 4.8 },
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Navbar = ({ setPage }) => (
            <nav className="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
                <div className="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                    <div className="flex items-center gap-8">
                        <button onClick={() => setPage('home')} className="text-2xl font-bold tracking-tighter text-black">
                            VELLI<span className="text-emerald-500">.</span>
                        </button>
                        <div className="hidden md:flex gap-6 text-sm font-medium text-gray-600 uppercase tracking-widest">
                            <a href="#" className="hover:text-emerald-500">Shop All</a>
                            <a href="#" className="hover:text-emerald-500">Yoga</a>
                            <a href="#" className="hover:text-emerald-500">Running</a>
                        </div>
                    </div>
                    <div className="flex items-center gap-5 text-black">
                        <Icon name="search" />
                        <button onClick={() => setPage('account')}><Icon name="user" /></button>
                        <button onClick={() => setPage('cart')} className="relative">
                            <Icon name="shopping-bag" />
                            <span className="absolute -top-1 -right-1 w-2 h-2 bg-emerald-500 rounded-full"></span>
                        </button>
                    </div>
                </div>
            </nav>
        );

        const Hero = ({ setPage }) => (
            <section className="relative h-screen flex items-center justify-center pt-20">
                <div className="absolute inset-0 z-0">
                    <img src="https://sc02.alicdn.com/kf/Aca310128cd57456fb7906976e19ef31ar.png" className="w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-black/10" />
                </div>
                <div className="relative z-10 text-center px-4 text-black">
                    <motion.span initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="inline-block px-4 py-1.5 mb-6 text-xs font-bold text-emerald-600 bg-emerald-50 rounded-full uppercase tracking-widest">Spring 2026 Collection</motion.span>
                    <motion.h1 initial={{opacity:0, y:30}} animate={{opacity:1, y:0}} transition={{delay:0.2}} className="text-6xl md:text-8xl font-black mb-8 tracking-tighter uppercase">POWER IN<br/>MOTION</motion.h1>
                    <div className="flex gap-4 justify-center">
                        <button onClick={() => setPage('product')} className="px-8 py-4 bg-black text-white rounded-full font-bold hover:bg-emerald-600 transition-all flex items-center gap-2">Shop Now <Icon name="arrow-right" size={18} /></button>
                        <button className="px-8 py-4 bg-white/80 backdrop-blur rounded-full font-bold border border-gray-200">Our Story</button>
                    </div>
                </div>
            </section>
        );

        const Home = ({ setPage }) => (
            <div>
                <Hero setPage={setPage} />
                <section className="max-w-7xl mx-auto px-4 py-24 text-black">
                    <h2 className="text-4xl font-black mb-12 uppercase text-left">Shop by Category</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {categories.map(c => (
                            <div key={c.id} className="group relative h-[500px] rounded-3xl overflow-hidden cursor-pointer" onClick={() => setPage('product')}>
                                <img src={c.image} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent" />
                                <div className="absolute bottom-0 p-8 text-white text-left">
                                    <h3 className="text-3xl font-bold mb-2 uppercase">{c.name}</h3>
                                    <p className="text-sm opacity-0 group-hover:opacity-100 transition-opacity">{c.description}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
                <section className="max-w-7xl mx-auto px-4 py-24 bg-gray-50/50 text-black">
                    <h2 className="text-4xl font-black mb-12 text-center uppercase">Trending Now</h2>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                        {products.map(p => (
                            <div key={p.id} className="group cursor-pointer" onClick={() => setPage('product')}>
                                <div className="aspect-[4/5] rounded-2xl overflow-hidden bg-white mb-4 relative">
                                    <img src={p.image} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
                                    <div className="absolute bottom-4 right-4 w-10 h-10 bg-black text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all shadow-lg"><Icon name="plus" /></div>
                                </div>
                                <div className="text-left px-1">
                                    <h4 className="font-bold mb-1 uppercase text-sm truncate">{p.name}</h4>
                                    <p className="text-gray-500 text-xs mb-2">{p.category}</p>
                                    <p className="font-black text-lg">${p.price}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            </div>
        );

        const ProductDetail = ({ setPage }) => {
            const [size, setSize] = useState('M');
            return (
                <div className="max-w-7xl mx-auto px-4 py-32 grid grid-cols-1 lg:grid-cols-2 gap-16 text-black text-left">
                    <div className="aspect-[4/5] rounded-3xl overflow-hidden bg-gray-50"><img src={products[0].image} className="w-full h-full object-cover" /></div>
                    <div className="flex flex-col justify-center">
                        <span className="text-emerald-600 font-bold uppercase tracking-widest text-sm mb-4">New Arrival</span>
                        <h1 className="text-5xl font-black mb-6 uppercase tracking-tighter">{products[0].name}</h1>
                        <p className="text-3xl font-bold mb-8">${products[0].price}</p>
                        <p className="text-gray-500 mb-12 leading-relaxed">High-performance compression fabric meets elegant design. Perfect for your daily grind. Designed for the modern woman who demands excellence.</p>
                        <div className="mb-4 text-sm font-bold uppercase tracking-widest text-gray-400">Select Size</div>
                        <div className="flex gap-3 mb-12">
                            {['XS','S','M','L','XL'].map(s => (
                                <button key={s} onClick={() => setSize(s)} className={`w-14 h-14 rounded-xl font-bold transition-all ${size === s ? 'bg-black text-white scale-110 shadow-lg' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}>{s}</button>
                            ))}
                        </div>
                        <button onClick={() => setPage('cart')} className="w-full h-16 bg-black text-white rounded-2xl font-bold text-lg hover:bg-emerald-600 transition-all uppercase tracking-widest">Add to Cart</button>
                    </div>
                </div>
            );
        };

        const Cart = ({ setPage }) => (
            <div className="max-w-4xl mx-auto px-4 py-32 text-center text-black">
                <h1 className="text-4xl font-black mb-12 uppercase tracking-tighter">Your Cart</h1>
                <div className="bg-gray-50 p-8 rounded-[2rem] flex items-center gap-8 mb-12 text-left">
                    <img src={products[0].image} className="w-24 h-32 rounded-xl object-cover" />
                    <div className="flex-1">
                        <h3 className="font-bold text-xl uppercase">{products[0].name}</h3>
                        <p className="text-gray-500">Size: M</p>
                    </div>
                    <p className="font-black text-xl">${products[0].price}</p>
                </div>
                <button onClick={() => setPage('checkout')} className="w-full h-16 bg-black text-white rounded-2xl font-bold text-xl uppercase tracking-widest hover:bg-emerald-600 transition-all">Proceed to Checkout</button>
            </div>
        );

        const Checkout = ({ setPage }) => (
            <div className="max-w-md mx-auto px-4 py-32 text-black">
                <h1 className="text-4xl font-black mb-12 text-center uppercase tracking-tighter">Checkout</h1>
                <div className="space-y-6 mb-12">
                    <input placeholder="Full Name" className="w-full h-14 bg-gray-50 rounded-2xl px-6 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" />
                    <input placeholder="Shipping Address" className="w-full h-14 bg-gray-50 rounded-2xl px-6 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" />
                    <div className="p-6 border-2 border-emerald-500 bg-emerald-50 rounded-2xl font-bold text-left">
                        <div className="text-emerald-600 uppercase text-[10px] tracking-widest mb-1 font-black">Recommended</div>
                        Apple Pay
                    </div>
                </div>
                <button onClick={() => setPage('success')} className="w-full h-16 bg-black text-white rounded-2xl font-bold text-xl shadow-2xl shadow-emerald-500/20 uppercase tracking-widest hover:bg-emerald-600 transition-all">Pay Now $29.99</button>
            </div>
        );

        const Success = ({ setPage }) => (
            <div className="h-screen flex flex-col items-center justify-center text-center p-4 text-black">
                <div className="w-24 h-24 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mb-8 shadow-xl shadow-emerald-100"><Icon name="check-circle" size={48} /></div>
                <h1 className="text-4xl font-black mb-4 uppercase tracking-tighter">Payment Success!</h1>
                <p className="text-gray-500 mb-12 font-medium">Your order has been placed successfully. You will receive an email shortly.</p>
                <button onClick={() => setPage('home')} className="px-12 py-4 bg-black text-white rounded-full font-bold uppercase tracking-widest hover:bg-emerald-600 transition-all">Back to Home</button>
            </div>
        );

        const Account = () => (
            <div className="max-w-2xl mx-auto px-4 py-32 text-black text-left">
                <div className="flex items-center gap-8 mb-16">
                    <div className="w-24 h-24 bg-emerald-100 rounded-[2rem] flex items-center justify-center text-emerald-500 text-3xl font-black shadow-lg">S</div>
                    <div>
                        <h1 className="text-3xl font-black uppercase">Steven</h1>
                        <p className="text-gray-400 font-medium text-xs uppercase tracking-widest">Premium Member · since 2026</p>
                    </div>
                </div>
                <div className="space-y-4">
                    {['My Orders','Wishlist','Addresses','Sign Out'].map(m => (
                        <div key={m} className={`p-6 bg-gray-50 rounded-3xl font-bold flex justify-between items-center cursor-pointer hover:bg-white hover:shadow-xl transition-all border border-transparent hover:border-gray-100 ${m === 'Sign Out' ? 'text-red-500' : ''}`}>
                            <span className="uppercase tracking-widest text-sm">{m}</span> <Icon name="chevron-right" size={16} />
                        </div>
                    ))}
                </div>
            </div>
        );

        function App() {
            const [page, setPage] = useState('home');
            useEffect(() => { window.scrollTo(0,0); }, [page]);

            return (
                <div className="min-h-screen">
                    {page !== 'success' && <Navbar setPage={setPage} />}
                    <main>
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={page}
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -10 }}
                                transition={{ duration: 0.3 }}
                            >
                                {page === 'home' && <Home setPage={setPage} />}
                                {page === 'product' && <ProductDetail setPage={setPage} />}
                                {page === 'cart' && <Cart setPage={setPage} />}
                                {page === 'checkout' && <Checkout setPage={setPage} />}
                                {page === 'success' && <Success setPage={setPage} />}
                                {page === 'account' && <Account />}
                            </motion.div>
                        </AnimatePresence>
                    </main>
                    {page === 'home' && (
                        <footer className="py-12 border-t border-gray-100 text-center text-gray-400 text-xs uppercase tracking-widest font-bold">
                            <p>&copy; 2026 VELLI.FIT Sportswear. All rights reserved.</p>
                        </footer>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
